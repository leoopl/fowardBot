services:
  forwardbot:
    build: .
    image: forwardbot:latest
    container_name: forwardbot
    restart: unless-stopped
    environment:
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONTROL_CHAT: ${CONTROL_CHAT:-me}
    volumes:
      - session:/sessions
      - config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "test -f /sessions/heartbeat && find /sessions/heartbeat -mmin -3 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  session:
  config:
