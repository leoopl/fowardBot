#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# Oracle Cloud Always Free — Ubuntu 24.04 aarch64 (VM.Standard.A1.Flex)
#
# Paste this file in the "Initialization script" field under Advanced Options
# when creating a new instance. It runs once, automatically, during first boot.
# No SSH access is required — everything is provisioned before you log in.
# ─────────────────────────────────────────────────────────────────────────────

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git
  - htop
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-listchanges

# ── files written before runcmd executes ─────────────────────────────────────
write_files:
  # Docker daemon: log rotation + live-restore (containers survive dockerd restart)
  - path: /etc/docker/daemon.json
    owner: root:root
    permissions: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "20m",
          "max-file": "5"
        },
        "live-restore": true
      }

  # Automatic security upgrades
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root:root
    permissions: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # fail2ban SSH jail
  - path: /etc/fail2ban/jail.local
    owner: root:root
    permissions: "0644"
    content: |
      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 5
      bantime  = 3600
      findtime = 600

# ── commands run as root after packages are installed ────────────────────────
runcmd:
  # ── Docker CE from official repository ──────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update -qq
  - apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ubuntu

  # ── 2 GB swap (build safety buffer for TgCrypto compilation) ────────────────
  - fallocate -l 2G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - bash -c 'echo "/swapfile none swap sw 0 0" >> /etc/fstab'

  # ── UFW firewall ─────────────────────────────────────────────────────────────
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh comment 'SSH'
  - ufw --force enable

  # ── fail2ban ─────────────────────────────────────────────────────────────────
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # ── unattended-upgrades ───────────────────────────────────────────────────────
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # ── done marker (first-login.sh checks for this) ─────────────────────────────
  - bash -c 'echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > /home/ubuntu/.cloud-init-done'
  - chown ubuntu:ubuntu /home/ubuntu/.cloud-init-done
